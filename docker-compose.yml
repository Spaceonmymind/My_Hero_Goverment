services:
  db:
    image: postgres:16
    container_name: myhero-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: myhero
      POSTGRES_USER: myhero
      POSTGRES_PASSWORD: myhero_pass
    ports:
      - "5433:5432"
    volumes:
      - myhero_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhero -d myhero"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: myhero-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .example.env
    environment:
      DATABASE_URL: postgresql+psycopg://myhero:myhero_pass@db:5432/myhero
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  myhero_pg: