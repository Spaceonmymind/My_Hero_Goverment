<!-- app/presentation/web/templates/components/_toast.html -->
<div class="toast" id="toast" aria-live="polite" aria-atomic="true">
  <div class="toast-inner">
    <div class="toast-icon" aria-hidden="true"></div>
    <div class="toast-text">
      <div class="toast-title" id="toastTitle">Готово</div>
      <div class="toast-body muted" id="toastBody">Действие выполнено.</div>
    </div>
    <button class="toast-close" type="button" data-cmd="toastClose" aria-label="Закрыть">×</button>
  </div>
</div>
