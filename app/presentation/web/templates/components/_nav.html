<!-- app/presentation/web/templates/components/_nav.html -->
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="/">
      <span class="brand-dot"></span>
      <span class="brand-name">Мой Герой</span>
      <span class="brand-badge">MVP</span>
    </a>

    <nav class="nav">
      {% if user and user.role == "student" %}
        <a class="nav-link {% if active_nav == 'dashboard' %}active{% endif %}" href="/">Дашборд</a>
        <a class="nav-link {% if active_nav == 'tasks' %}active{% endif %}" href="/tasks">Задания</a>
      {% elif user and user.role == "admin" %}
        <a class="nav-link {% if active_nav == 'admin_dashboard' %}active{% endif %}" href="/admin">Панель</a>
        <a class="nav-link {% if active_nav == 'admin_tasks' %}active{% endif %}" href="/admin/tasks">Задания</a>
      {% else %}
        <a class="nav-link {% if active_nav == 'login' %}active{% endif %}" href="/auth/login">Вход</a>
      {% endif %}
    </nav>

    <div class="userpill">
      {% if user %}
        <span class="dot"></span>
        <span class="userpill-text">{{ user.email }}</span>
        <span class="userpill-role">{{ user.role }}</span>
      {% else %}
        <span class="muted">гость</span>
      {% endif %}
    </div>
  </div>
</header>
